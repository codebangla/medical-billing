version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medicalbilling-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - medicalbilling-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: medicalbilling-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
    ports:
      - "8080:8080"
    command: start-dev
    networks:
      - medicalbilling-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
      interval: 30s
      timeout: 3s
      retries: 5

  # Medical Billing API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.API
    container_name: medicalbilling-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MedicalBillingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Keycloak__Authority=http://keycloak:8080/realms/MedicalBilling
      - Keycloak__Audience=medical-billing-api
      - AllowedOrigins__0=http://localhost:5000
      - AllowedOrigins__1=http://blazor:8080
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - medicalbilling-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 40s

  # Blazor Server Frontend
  blazor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Blazor
    container_name: medicalbilling-blazor
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://api:8080
      - Keycloak__Authority=http://keycloak:8080/realms/MedicalBilling
      - Keycloak__ClientId=medical-billing-blazor
    ports:
      - "5000:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - medicalbilling-network

networks:
  medicalbilling-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
